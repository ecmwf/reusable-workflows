name: CD System Package

on:
  workflow_call:
    inputs:
      name:
        description: 'Build name for artifacts'
        required: false
        type: string
        default: 'system-package'
      ref_name:
        description: 'Git ref name (defaults to PR head ref or github.ref_name)'
        required: false
        type: string
      dry_run:
        description: 'Force dry run mode - build only, no uploads'
        required: false
        type: boolean
        default: false
      os:
        description: 'Target OS (e.g., debian-12, ubuntu-24.04, rocky-9)'
        required: true
        type: string
      skip_version_check:
        description: 'Skip tag-vs-VERSION validation'
        required: false
        type: string
        default: 'false'
      package_deps:
        description: 'Package dependencies as comma-separated values'
        required: false
        type: string
        default: ''
      description:
        description: 'Package description'
        required: false
        type: string
        default: ''
      license:
        description: 'Package license'
        required: false
        type: string
        default: ''
      maintainer:
        description: 'Package maintainer'
        required: false
        type: string
        default: 'software@ecmwf.int'
      vendor:
        description: 'Package vendor'
        required: false
        type: string
        default: 'ECMWF'
      homepage_url:
        description: 'Package homepage URL'
        required: false
        type: string
        default: ''
      install_prefix:
        description: 'Installation prefix'
        required: false
        type: string
        default: '/opt/ecmwf'
      self_test:
        description: 'Run tests after building'
        required: false
        type: string
        default: 'true'
      install_test:
        description: 'Run installation test'
        required: false
        type: string
        default: 'false'
      install_test_os_image:
        description: 'OS image for installation test'
        required: false
        type: string
        default: ''
      install_test_command:
        description: 'Command to run for installation test'
        required: false
        type: string
        default: ''
      build_type:
        description: 'CMake build type'
        required: false
        type: string
        default: 'Release'
      env:
        description: 'Environment variables'
        required: false
        type: string
        default: ''
      deb_section:
        description: 'Debian package section'
        required: false
        type: string
        default: ''
      deb_priority:
        description: 'Debian package priority'
        required: false
        type: string
        default: 'optional'
      rpm_group:
        description: 'RPM package group'
        required: false
        type: string
        default: ''
      dependencies:
        description: 'Build dependencies as line-separated values (e.g., "owner/repo@ref")'
        required: false
        type: string
        default: ''
      dependency_branch:
        description: 'Default branch/tag for dependency repositories'
        required: false
        type: string
        default: ''
      cmake_options:
        description: 'CMake options as line-separated values'
        required: false
        type: string
        default: ''
      ctest_options:
        description: 'CTest options as line-separated values'
        required: false
        type: string
        default: ''
      dependency_cmake_options:
        description: 'CMake options for dependencies as line-separated values'
        required: false
        type: string
        default: ''
      cmake:
        description: 'Use CMake instead of ecbuild for build configuration'
        required: false
        type: string
        default: 'false'
      ecbundle:
        description: 'Use ecbundle for building bundles'
        required: false
        type: string
        default: 'false'
      self_build:
        description: 'Build from currently checked out repository'
        required: false
        type: string
        default: 'true'
      toolchain_file:
        description: 'CMake toolchain file path'
        required: false
        type: string
        default: ''
      parallelism_factor:
        description: 'Build parallelism factor'
        required: false
        type: string
        default: '2'
      compiler_cc:
        description: 'C compiler'
        required: false
        type: string
        default: 'gcc'
      compiler_cxx:
        description: 'C++ compiler'
        required: false
        type: string
        default: 'g++'
      compiler_fc:
        description: 'Fortran compiler'
        required: false
        type: string
        default: 'gfortran'
      cache_suffix:
        description: 'Cache key suffix'
        required: false
        type: string
        default: ''
      save_cache:
        description: 'Save build cache'
        required: false
        type: string
        default: 'true'
      recreate_cache:
        description: 'Recreate build cache from scratch'
        required: false
        type: string
        default: 'false'
      gh_pat:
        description: 'GitHub PAT token (defaults to GH_REPO_READ_TOKEN secret)'
        required: false
        type: string
        default: ''
      nexus_token:
        description: 'Nexus upload token (defaults to platform-specific secret)'
        required: false
        type: string
        default: ''
      nexus_url:
        description: 'Nexus repository URL (defaults to platform-specific secret)'
        required: false
        type: string
        default: ''
      docker_registry_username:
        description: 'Docker registry username (defaults to ECMWF_DOCKER_REGISTRY_USERNAME secret)'
        required: false
        type: string
        default: ''
      docker_registry_password:
        description: 'Docker registry password (defaults to ECMWF_DOCKER_REGISTRY_ACCESS_TOKEN secret)'
        required: false
        type: string
        default: ''

jobs:
  setup:
    name: Setup Platform
    runs-on: ubuntu-latest
    outputs:
      os: ${{ steps.map.outputs.os }}
      container: ${{ steps.map.outputs.container }}
      nexus_token_secret: ${{ steps.map.outputs.nexus_token_secret }}
      nexus_url_secret: ${{ steps.map.outputs.nexus_url_secret }}
    steps:
      - name: Map OS to platform config
        id: map
        shell: python3 {0}
        # Mapping kept in sync with cd-actions/load-config/config/platforms-system-package.yml
        run: |
          import os

          platforms = {
              "ubuntu-22.04": {"os": "ubuntu-22.04", "nexus_token_secret": "NEXUS_TEST_REPO_UPLOAD_TOKEN", "nexus_url_secret": "NEXUS_TEST_REPO_URL_UBUNTU_2204"},
              "ubuntu-24.04": {"os": "ubuntu-24.04", "nexus_token_secret": "NEXUS_TEST_REPO_UPLOAD_TOKEN", "nexus_url_secret": "NEXUS_TEST_REPO_URL_UBUNTU_2404"},
              "debian-11": {"os": "debian-11", "nexus_token_secret": "NEXUS_REPO_UPLOAD_TOKEN", "nexus_url_secret": "NEXUS_REPO_URL_DEBIAN_11"},
              "debian-12": {"os": "debian-12", "nexus_token_secret": "NEXUS_REPO_UPLOAD_TOKEN", "nexus_url_secret": "NEXUS_REPO_URL_DEBIAN_12"},
              "debian-13": {"os": "debian-13", "nexus_token_secret": "NEXUS_TEST_REPO_UPLOAD_TOKEN", "nexus_url_secret": "NEXUS_TEST_REPO_URL_DEBIAN_13"},
              "rocky-8": {"os": "rocky-8.10", "nexus_token_secret": "NEXUS_REPO_UPLOAD_TOKEN", "nexus_url_secret": "NEXUS_REPO_URL_ROCKY_8"},
              "rocky-8.7": {"os": "rocky-8.7", "nexus_token_secret": "NEXUS_REPO_UPLOAD_TOKEN", "nexus_url_secret": "NEXUS_REPO_URL_ROCKY_8"},
              "rocky-8.10": {"os": "rocky-8.10", "nexus_token_secret": "NEXUS_REPO_UPLOAD_TOKEN", "nexus_url_secret": "NEXUS_REPO_URL_ROCKY_8"},
              "rocky-9": {"os": "rocky-9.7", "nexus_token_secret": "NEXUS_TEST_REPO_UPLOAD_TOKEN", "nexus_url_secret": "NEXUS_TEST_REPO_URL_ROCKY_9"},
              "rocky-9.7": {"os": "rocky-9.7", "nexus_token_secret": "NEXUS_TEST_REPO_UPLOAD_TOKEN", "nexus_url_secret": "NEXUS_TEST_REPO_URL_ROCKY_9"},
              "rocky-10": {"os": "rocky-10.1", "nexus_token_secret": "NEXUS_TEST_REPO_UPLOAD_TOKEN", "nexus_url_secret": "NEXUS_TEST_REPO_URL_ROCKY_10"},
              "rocky-10.1": {"os": "rocky-10.1", "nexus_token_secret": "NEXUS_TEST_REPO_UPLOAD_TOKEN", "nexus_url_secret": "NEXUS_TEST_REPO_URL_ROCKY_10"},
              "fedora-43": {"os": "fedora-43", "nexus_token_secret": "NEXUS_TEST_REPO_UPLOAD_TOKEN", "nexus_url_secret": "NEXUS_TEST_REPO_URL_FEDORA_43"},
              "centos-7": {"os": "centos-7", "nexus_token_secret": "NEXUS_TEST_REPO_UPLOAD_TOKEN", "nexus_url_secret": "NEXUS_TEST_REPO_URL_CENTOS_7"},
          }

          os_input = "${{ inputs.os }}"
          if os_input not in platforms:
              supported = ", ".join(sorted(platforms.keys()))
              print(f"::error::Unknown OS: {os_input}. Supported: {supported}")
              raise SystemExit(1)

          p = platforms[os_input]
          container = f"eccr.ecmwf.int/platform-builder/platform-builder:{p['os']}"

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"os={p['os']}\n")
              f.write(f"container={container}\n")
              f.write(f"nexus_token_secret={p['nexus_token_secret']}\n")
              f.write(f"nexus_url_secret={p['nexus_url_secret']}\n")

  build:
    name: Build System Package
    needs: [setup]
    runs-on: [self-hosted, platform-builder-docker-xl]
    container:
      image: ${{ needs.setup.outputs.container }}
      credentials:
        username: ${{ inputs.docker_registry_username || secrets.ECMWF_DOCKER_REGISTRY_USERNAME }}
        password: ${{ inputs.docker_registry_password || secrets.ECMWF_DOCKER_REGISTRY_ACCESS_TOKEN }}
      options: '--user root'
      volumes:
        - '/var/run/docker.sock:/var/run/docker.sock'
    steps:
      - name: Detect release type
        id: detect-release-type
        uses: ecmwf/reusable-workflows/cd-actions/detect-release-type@v2
        with:
          ref_name: ${{ inputs.ref_name }}
          dry_run: ${{ inputs.dry_run }}

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: ${{ startsWith(github.ref, 'refs/tags/') && '1' || '50' }}
          fetch-tags: ${{ !startsWith(github.ref, 'refs/tags/') }}

      - name: Build System Package
        uses: ecmwf/reusable-workflows/cd-actions/system-package@v2
        with:
          name: ${{ inputs.name }}
          ref_name: ${{ steps.detect-release-type.outputs.ref_name }}
          dry_run: ${{ steps.detect-release-type.outputs.is_dry_run }}
          skip_version_check: ${{ inputs.skip_version_check }}
          package_deps: ${{ inputs.package_deps }}
          description: ${{ inputs.description }}
          license: ${{ inputs.license }}
          maintainer: ${{ inputs.maintainer }}
          vendor: ${{ inputs.vendor }}
          homepage_url: ${{ inputs.homepage_url }}
          install_prefix: ${{ inputs.install_prefix }}
          self_test: ${{ inputs.self_test }}
          install_test: ${{ inputs.install_test }}
          install_test_os_image: ${{ inputs.install_test_os_image }}
          install_test_command: ${{ inputs.install_test_command }}
          build_type: ${{ inputs.build_type }}
          env: ${{ inputs.env }}
          deb_section: ${{ inputs.deb_section }}
          deb_priority: ${{ inputs.deb_priority }}
          rpm_group: ${{ inputs.rpm_group }}
          os: ${{ needs.setup.outputs.os }}
          dependencies: ${{ inputs.dependencies }}
          dependency_branch: ${{ inputs.dependency_branch }}
          cmake_options: ${{ inputs.cmake_options }}
          ctest_options: ${{ inputs.ctest_options }}
          dependency_cmake_options: ${{ inputs.dependency_cmake_options }}
          cmake: ${{ inputs.cmake }}
          ecbundle: ${{ inputs.ecbundle }}
          self_build: ${{ inputs.self_build }}
          toolchain_file: ${{ inputs.toolchain_file }}
          parallelism_factor: ${{ inputs.parallelism_factor }}
          compiler_cc: ${{ inputs.compiler_cc }}
          compiler_cxx: ${{ inputs.compiler_cxx }}
          compiler_fc: ${{ inputs.compiler_fc }}
          cache_suffix: ${{ inputs.cache_suffix }}
          save_cache: ${{ inputs.save_cache }}
          recreate_cache: ${{ inputs.recreate_cache }}
          gh_pat: ${{ inputs.gh_pat || secrets.GH_REPO_READ_TOKEN }}
          nexus_token: ${{ inputs.nexus_token || secrets[needs.setup.outputs.nexus_token_secret] }}
          nexus_url: ${{ inputs.nexus_url || secrets[needs.setup.outputs.nexus_url_secret] }}
