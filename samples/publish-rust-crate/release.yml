name: Publish Rust crate

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    uses: ecmwf/reusable-workflows/.github/workflows/publish-rust-crate.yml@v2
    with:
      manifest-path: Cargo.toml
      dry-run: false
    secrets:
      cargo_registry_token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
