name: Tarball Builder
description: Build source tarballs using ecbuild on platform-builder runners

inputs:
  name:
    description: 'Build name for artifacts'
    required: false
    default: 'tarball'
  ref_name:
    description: 'Git ref name for artifacts (defaults to github.ref_name)'
    required: false
    default: ''
  ecbuild_version:
    description: 'ecbuild version/tag to checkout (defaults to latest release)'
    required: false
    default: ''
  cmake_options:
    description: 'CMake options as line-separated key=value pairs (e.g., "-DCMAKE_BUILD_TYPE=Release\n-DENABLE_TESTS=ON")'
    required: false
    default: ''
  confluence_token:
    description: 'Confluence API token'
    required: false
    default: ''
  confluence_space:
    description: 'Confluence space key (e.g., MAGP)'
    required: false
    default: ''
  dependencies:
    description: 'List of dependency repositories to build (one per line, format: owner/repo@ref)'
    required: false
    default: ''
  dependency_branch:
    description: 'Default branch/tag for dependency repositories'
    required: false
    default: ''
  dependency_cmake_options:
    description: 'CMake options for dependencies (line-separated, format: -Downer/repo=-DOPTION=VALUE,...)'
    required: false
    default: ''
  gh_pat:
    description: 'GitHub PAT for repo access'
    required: false
    default: ''
  confluence_page_title:
    description: 'Confluence page title'
    required: false
    default: 'Releases'

outputs:
  tarball_path:
    description: 'Path to generated tarball file'
    value: ${{ steps.find-tarball.outputs.tarball_path }}

runs:
  using: composite
  steps:
    - name: Install ecbuild
      if: ${{ github.repository != 'ecmwf/ecbuild' }}
      shell: bash
      run: |
        ecbuild_version="${{ inputs.ecbuild_version }}"

        if [ -z "$ecbuild_version" ]; then
          echo "Fetching latest ecbuild release from GitHub API..."
          ecbuild_version=$(curl -sL https://api.github.com/repos/ecmwf/ecbuild/releases/latest \
            | grep '"tag_name":' \
            | sed -E 's/.*"tag_name": *"([^"]+)".*/\1/')

          if [ -z "$ecbuild_version" ]; then
            echo "::error::Failed to fetch latest ecbuild release from GitHub API"
            exit 1
          fi
          echo "Using latest release: $ecbuild_version"
        fi

        echo "Cloning ecbuild to ${{ runner.temp }}/ecbuild..."
        git clone --depth 1 --branch "$ecbuild_version" \
          https://github.com/ecmwf/ecbuild.git "${{ runner.temp }}/ecbuild"
        echo "${{ runner.temp }}/ecbuild/bin" >> $GITHUB_PATH
        echo "Added ecbuild to PATH"

    - name: Build dependencies
      if: ${{ inputs.dependencies != '' }}
      shell: bash
      run: |
        set -euo pipefail

        install_prefix="${{ runner.temp }}/install"
        mkdir -p "$install_prefix"

        # Mask PAT in logs
        if [ -n "${{ inputs.gh_pat }}" ]; then
          echo "::add-mask::${{ inputs.gh_pat }}"
        fi

        # Parse dependency cmake options into associative array
        declare -A dep_cmake_opts
        while IFS= read -r line; do
          [ -z "$line" ] && continue
          # Strip -D prefix added by matrix generator
          line="${line#-D}"
          repo="${line%%=*}"
          opts="${line#*=}"
          # Convert commas to spaces
          dep_cmake_opts["$repo"]="${opts//,/ }"
        done <<< "${{ inputs.dependency_cmake_options }}"

        while IFS= read -r dep; do
          [ -z "$dep" ] && continue

          # Parse owner/repo@ref format
          if [[ "$dep" == *"@"* ]]; then
            repo="${dep%%@*}"
            ref="${dep#*@}"
          else
            repo="$dep"
            ref="${{ inputs.dependency_branch }}"
          fi

          name=$(basename "$repo")
          echo "::group::Building dependency: $name ($repo${ref:+@$ref})"

          # Clone
          clone_url="https://github.com/${repo}.git"
          if [ -n "${{ inputs.gh_pat }}" ]; then
            clone_url="https://x-access-token:${{ inputs.gh_pat }}@github.com/${repo}.git"
          fi

          dep_src="${{ runner.temp }}/deps-src/$name"
          git clone --depth 1 --quiet ${ref:+--branch "$ref"} "$clone_url" "$dep_src"

          # Build and install
          dep_build="$dep_src/build"
          mkdir -p "$dep_build"
          cd "$dep_build"

          cmake_opts="${dep_cmake_opts[$repo]:-}"
          ecbuild \
            -DCMAKE_INSTALL_PREFIX="$install_prefix" \
            -DCMAKE_PREFIX_PATH="$install_prefix" \
            $cmake_opts \
            ..

          cmake --build . -j"$(nproc)"
          cmake --install .

          echo "::endgroup::"
        done <<< "${{ inputs.dependencies }}"

        # Export prefix for subsequent steps
        echo "CMAKE_PREFIX_PATH=$install_prefix${CMAKE_PREFIX_PATH:+:$CMAKE_PREFIX_PATH}" >> "$GITHUB_ENV"

    - name: Create build directory
      shell: bash
      run: |
        echo "Creating build directory..."
        mkdir -p build

    - name: Run ecbuild
      shell: bash
      run: |
        # Convert line-separated options to space-separated
        cmake_options=$(echo "${{ inputs.cmake_options }}" | tr '\n' ' ' | xargs)

        echo "Running ecbuild in build directory..."
        cd build

        if [ "${{ github.repository }}" = "ecmwf/ecbuild" ]; then
            echo "Bootstrap mode: ecbuild configures its own CMAKE_MODULE_PATH"
            cmake_cmd="cmake ."
        else
            cmake_cmd="ecbuild"
        fi

        if [ -n "$cmake_options" ]; then
            echo "CMake options: $cmake_options"
            $cmake_cmd $cmake_options ..
        else
            $cmake_cmd ..
        fi

    - name: Build source package
      shell: bash
      run: |
        echo "Building source package..."
        cd build
        make package_source

        echo ""
        echo "Build complete!"

    - name: List generated tarballs
      shell: bash
      run: |
        echo "Generated tarballs:"
        find build -name "*.tar.gz" -type f | sort

    - name: Verify artifacts
      shell: bash
      run: |
        echo "Checking for source tarball in: build"

        if ! find build -maxdepth 1 -name "*-Source.tar.gz" -type f | head -1 | grep -q .; then
            echo "No source tarball found in: build"
            echo "Available tar.gz files:"
            find build -name "*.tar.gz" -type f
            exit 1
        fi

        echo "Tarball verification successful!"

    - name: Find tarball path
      id: find-tarball
      shell: bash
      run: |
        tarball=$(find build -maxdepth 1 -name "*-Source.tar.gz" -type f | head -1)

        echo "tarball_path=$tarball" >> $GITHUB_OUTPUT
        echo "Found tarball: $tarball"

    - name: Sanitize ref name
      id: sanitize
      shell: bash
      run: |
        ref_name="${{ inputs.ref_name || github.ref_name }}"
        echo "safe_ref_name=${ref_name//\//-}" >> $GITHUB_OUTPUT

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ github.run_id }}-${{ inputs.name }}-${{ steps.sanitize.outputs.safe_ref_name }}
        path: ${{ steps.find-tarball.outputs.tarball_path }}
        if-no-files-found: error
        retention-days: 90

    - name: Upload to Confluence
      if: ${{ inputs.confluence_token != '' && inputs.confluence_space != '' }}
      uses: ecmwf/reusable-workflows/cd-actions/confluence-upload@v2
      with:
        token: ${{ inputs.confluence_token }}
        file_path: ${{ steps.find-tarball.outputs.tarball_path }}
        space: ${{ inputs.confluence_space }}
        page_title: ${{ inputs.confluence_page_title }}
